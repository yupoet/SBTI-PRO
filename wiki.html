    :root {

      border-radius: 14px; border: 2px solid transparent;
      cursor: pointer; transition: border-color .15s, background .15s;
      text-align: center;

    .wiki-cell-placeholder {

      justify-content: center; font-size: 22px;

      padding: 24px; display: flex; gap: 24px; align-items: flex-start;

function rarityLabel(r) {
  if (r === null || r === undefined) return { stars: '？？？？？', label: '稀有度未知' };
  if (r < 2)   return { stars: '★★★★★', label: `极稀有 ${r.toFixed(2)}%` };
  if (r < 3.5) return { stars: '★★★★☆', label: `稀有 ${r.toFixed(2)}%` };
  if (r < 5)   return { stars: '★★★☆☆', label: `少见 ${r.toFixed(2)}%` };
  if (r < 7)   return { stars: '★★☆☆☆', label: `普通 ${r.toFixed(2)}%` };
  return         { stars: '★☆☆☆☆', label: `常见 ${r.toFixed(2)}%` };
}

function cellId(code) { return 'cell-' + code.replace(/[^a-zA-Z0-9]/g, '-'); }
function entryId(code) { return 'entry-' + code.replace(/[^a-zA-Z0-9-]/g, '-'); }

function renderGrid() {
  const grid = document.getElementById('wikiGrid');
  grid.innerHTML = TYPE_ORDER.map(code => {
    const t = TYPE_LIBRARY[code];
    const img = TYPE_IMAGES[code];
    const hasImg = !!img;
    return `<div class="wiki-cell" id="${cellId(code)}"
                 role="button" tabindex="0"
                 onclick="scrollToEntry(${JSON.stringify(code)})"
                 onkeydown="if(event.key==='Enter'||event.key===' ')scrollToEntry(${JSON.stringify(code)})"
                 title="${t.cn}">
      ${hasImg ? `<img src="${img}" alt="${code} ${t.cn}" loading="lazy"
                      onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
      <div class="wiki-cell-placeholder"${hasImg ? ' style="display:none"' : ''}>🎭</div>
      <div class="wiki-cell-code">${code}</div>
      <div class="wiki-cell-cn">${t.cn}</div>
    </div>`;
  }).join('');
}

    const t = TYPE_LIBRARY[code];
    const img = TYPE_IMAGES[code];

    const rl = rarityLabel(t.rarity);
    return `<article class="wiki-entry card" id="${entryId(code)}">
      ${hasImg ? `<img class="wiki-entry-img" src="${img}" alt="${code} ${t.cn}"

      <div class="wiki-entry-img-placeholder"${hasImg ? ' style="display:none"' : ''}>🎭</div>
      <div class="wiki-entry-body">
        <h2 class="wiki-entry-title">${code} <span class="wiki-entry-cn">${t.cn}</span></h2>
        <div class="wiki-entry-rarity"><span class="stars">${rl.stars}</span> ${rl.label}</div>
        <blockquote class="wiki-entry-intro">「${t.intro}」</blockquote>
        <p class="wiki-entry-oneliner">${t.oneliner}</p>
        <p class="wiki-entry-desc">${t.desc}</p>
      </div>
    </article>`;
  }).join('');
}

function scrollToEntry(code) {
  const el = document.getElementById(entryId(code));
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function initObserver() {
  const io = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const code = entry.target.id.slice('entry-'.length);
      document.querySelectorAll('.wiki-cell.active').forEach(c => c.classList.remove('active'));
      const cell = document.getElementById(cellId(code));
      if (cell) cell.classList.add('active');
    });
  }, { rootMargin: '-20% 0px -60% 0px', threshold: 0 });
  document.querySelectorAll('.wiki-entry').forEach(el => io.observe(el));
}

renderGrid();
renderEntries();
initObserver();
</script>
</body>
</html>
