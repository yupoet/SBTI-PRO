name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages deployment
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/sbti-pro/deployments" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"branch":"main"}')

          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          r = d.get('result', {})
          if not d.get('success'):
              print('ERROR:', d.get('errors'))
              sys.exit(1)
          print('Deployment triggered:', r.get('id'))
          print('URL:', r.get('url'))
          print('Stage:', r.get('latest_stage', {}).get('name'))
          "

      - name: Wait for deployment
        run: |
          echo "Deployment in progress at https://sbti.ytht.io"
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://sbti-pro-eig.pages.dev)
          echo "Pages.dev status: $STATUS"
